@PART[EDB-Stratolaunch-Body]{
	%RSSROConfig = True
	
	!MODEL{}
	MODEL
	{
		model = EDBMods/Parts/Planes/Stratolaunch-Body
		scale = 1,1,1
	}
	@scale = 1.0
	
	
	!RESOURCE[ElectricCharge]{}
	
	MODULE
	{
		name = ModuleFuelTanks
		basemass = -1
		volume = 8100
		type = Fuselage
		
		TANK
		{
			name = ElectricCharge
			amount = 96000.0
			maxAmount = 96000.0
		}
		
		TANK
		{
			name = Food
			amount = 264.0
			maxAmount = 264.0
		}
		TANK
		{
			name = Water
			amount = 176.0
			maxAmount = 176.0
		}
		TANK
		{
			name = Oxygen
			amount = 26640.0
			maxAmount = 26640.0
		}
		TANK
		{
			name = CarbonDioxide
			amount = 0
			maxAmount = 22960.0
		}
		TANK
		{
			name = Waste
			amount = 0
			maxAmount = 240.0
		}
		TANK
		{
			name = WasteWater
			amount = 0
			maxAmount = 224.0
		}
	}
}

@PART[EDB-Stratolaunch-HStab]{
	%RSSROConfig = True
	
	!MODEL{}
	MODEL
	{
		model = EDBMods/Parts/Planes/Stratolaunch-HStab
		scale = 1,1,1
	}
	@scale = 1.0
	
}

@PART[EDB-Stratolaunch-HStab]:NEEDS[FerramAerospaceResearch|NEAR]:FOR[FerramAerospaceResearch] {

    @maximum_drag = 0
    @minimum_drag = 0
    @angularDrag = 0
    !dragCoeff = DELETE
    !deflectionLiftCoeff = DELETE
    !MODULE[ModuleLiftingSurface] {}
    %MODULE[FARWingAerodynamicModel] {
        %b_2 = 9.0
        %MAC = 4.84
        %TaperRatio = 0.63
        %MidChordSweep = 0.0
        %maxdeflect = 24
        %ctrlSurfFrac = 0.33
        %transformName = ctrlSrf
        %rootMidChordOffsetFromOrig = 0, 1.0, 0
    }

}

