    @angularDrag = 0
    !dragCoeff = DELETE
    !deflectionLiftCoeff = DELETE
    !MODULE[ModuleLiftingSurface] {}
    %MODULE[FARWingAerodynamicModel] {
        %b_2 = 48.8
        %MAC = 8.3
        %TaperRatio = 0.48
        %MidChordSweep = 0.0
        %maxdeflect = 24
        %ctrlSurfFrac = 0.122
        %transformName = ctrlSrf
        %rootMidChordOffsetFromOrig = 0, 3.6, 0
    }

}