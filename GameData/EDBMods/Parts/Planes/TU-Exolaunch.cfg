@REFLECTION_CONFIG[default]:NEEDS[TexturesUnlimited]
{
	%enabled = true
}

KSP_MODEL_SHADER
{
	name = EDB-Exolaunch-Body
	model = EDBMods/Parts/Planes/Exolaunch-Body
	TEXTURE
    {
        shader = TU/Metallic


        PROPERTY
		{
			name = _Color
			color = 1.1,1.1,1.1   //higher numbers are lighter
		}
		PROPERTY
		{
			name = _Metal
			float = 0.4   // 0>less metallic 1>more metallic(mirror finish)
		}
		PROPERTY
			{
			name = _Smoothness
			float = 0.6   // 1>less blurry 0>more blurry
		}
	}
}

KSP_MODEL_SHADER
{
	name = EDB-Exolaunch-Wing
	model = EDBMods/Parts/Planes/Stratolaunch-Wing
	TEXTURE
    {
        shader = TU/Metallic


        PROPERTY
		{
			name = _Color
			color = 1.1,1.1,1.1   //higher numbers are lighter
		}
		PROPERTY
		{
			name = _Metal
			float = 0.4   // 0>less metallic 1>more metallic(mirror finish)
		}
		PROPERTY
			{
			name = _Smoothness
			float = 0.6   // 1>less blurry 0>more blurry
		}
	}
}

