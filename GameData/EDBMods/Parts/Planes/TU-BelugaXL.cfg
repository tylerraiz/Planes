@REFLECTION_CONFIG[default]:NEEDS[TexturesUnlimited]
{
	%enabled = true
}

KSP_MODEL_SHADER
{
	name = EDB-BelugaXL-Body
	model = EDBMods/Parts/Planes/BelugaXL-Body
	TEXTURE
    {
        shader = TU/Metallic
		mesh = Front
		mesh = Bay
		mesh = Ramp
		mesh = Floor

        PROPERTY
		{
			name = _Color
			color = 1.5,1.5,1.5   //higher numbers are lighter
		}
		PROPERTY
		{
			name = _Metal
			float = 0.4   // 0>less metallic 1>more metallic(mirror finish)
		}
		PROPERTY
			{
			name = _Smoothness
			float = 0.6   // 1>less blurry 0>more blurry
		}
	}
}
